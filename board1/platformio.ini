[env]
platform = ststm32
board = genericSTM32F103TB
framework = stm32cube

board_build.mcu = stm32f103tbu6
board_build.f_cpu = 72000000L

upload_protocol = stlink

[env:genericSTM32F103TB]
build_type = release

[env:genericSTM32F103TB_debug]
build_type = debug
build_flags =
    -DDEBUG_LOG_ENABLED=1
